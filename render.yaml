services:
  - type: web
    name: edu-app-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health

    envVars:
      # ── App ───────────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production

      # ── JWT ───────────────────────────────────────────────────────────────────
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d

      # ── CORS — both Firebase Hosting URLs ────────────────────────────────────
      - key: CLIENT_URL
        value: https://eduapp-810d8.web.app,https://eduapp-810d8.firebaseapp.com

      # ── Secrets — set these manually in Render dashboard ─────────────────────
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
